<!-- index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Background Remover</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, sans-serif;
    }

    body{
      background:#111827;
      color:white;
      display:flex;
      justify-content:center;
      align-items:center;
      min-height:100vh;
      padding:20px;
    }

    .container{
      width:100%;
      max-width:500px;
      background:#1f2937;
      padding:25px;
      border-radius:15px;
      text-align:center;
      box-shadow:0 0 20px rgba(0,0,0,0.4);
    }

    h1{
      margin-bottom:20px;
    }

    input{
      margin:15px 0;
      color:white;
    }

    button{
      padding:12px 20px;
      border:none;
      border-radius:8px;
      background:#2563eb;
      color:white;
      cursor:pointer;
      font-size:16px;
      transition:0.3s;
    }

    button:hover{
      background:#1d4ed8;
    }

    img{
      width:100%;
      margin-top:20px;
      border-radius:10px;
      background:white;
    }

    .loading{
      margin-top:15px;
      color:#facc15;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Background Remover</h1>

    <input type="file" id="imageInput" accept="image/*">

    <br>

    <button onclick="removeBackground()">
      Remove Background
    </button>

    <p class="loading" id="loading"></p>

    <img id="outputImage" />

  </div>

  <script>
    async function removeBackground() {

      const fileInput = document.getElementById("imageInput");
      const outputImage = document.getElementById("outputImage");
      const loading = document.getElementById("loading");

      if(fileInput.files.length === 0){
        alert("Please select an image");
        return;
      }

      const file = fileInput.files[0];

      loading.innerText = "Removing background...";

      const formData = new FormData();
      formData.append("image_file", file);
      formData.append("size", "auto");

      try {

        const response = await fetch(
          "https://api.remove.bg/v1.0/removebg",
          {
            method: "POST",
            headers: {
              "X-Api-Key": "vtA2JcUFLd8TMaoA7TXNvcUX"
            },
            body: formData
          }
        );

        const blob = await response.blob();

        const imageURL = URL.createObjectURL(blob);

        outputImage.src = imageURL;

        loading.innerText = "Background Removed Successfully";

      } catch (error) {

        loading.innerText = "Error removing background";

        console.log(error);
      }
    }
  </script>

</body>
</html>
