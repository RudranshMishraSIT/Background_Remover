<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Background Remover</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial,sans-serif;
    }

    body{
      background:#111827;
      color:white;
      display:flex;
      justify-content:center;
      align-items:center;
      min-height:100vh;
      padding:20px;
    }

    .container{
      width:100%;
      max-width:650px;
      background:#1f2937;
      padding:25px;
      border-radius:15px;
      text-align:center;
    }

    h1{
      margin-bottom:20px;
    }

    input{
      margin:10px 0;
    }

    button{
      padding:12px 20px;
      border:none;
      border-radius:8px;
      background:#2563eb;
      color:white;
      cursor:pointer;
      font-size:16px;
      margin-top:10px;
    }

    button:hover{
      background:#1d4ed8;
    }

    .preview-box{
      margin-top:20px;
      width:100%;
      min-height:350px;
      border-radius:12px;
      display:flex;
      justify-content:center;
      align-items:center;
      background:white;
      overflow:hidden;
      padding:20px;
    }

    img{
      max-width:100%;
    }

    canvas{
      display:none;
    }

  </style>
</head>
<body>

  <div class="container">

    <h1>Background Remover</h1>

    <input type="file" id="imageInput" accept="image/*">

    <br>

    <label>Select Background Color</label>

    <br>

    <input type="color" id="bgColor" value="#ffffff">

    <br>

    <button onclick="removeBackground()">
      Remove Background
    </button>

    <button onclick="downloadImage()">
      Download Image
    </button>

    <div class="preview-box" id="previewBox">

      <img id="outputImage">

    </div>

    <canvas id="canvas"></canvas>

  </div>

  <script>

    const previewBox = document.getElementById("previewBox");
    const bgColorPicker = document.getElementById("bgColor");

    // Live background color change
    bgColorPicker.addEventListener("input",(e)=>{

      previewBox.style.background = e.target.value;

    });

    async function removeBackground(){

      const fileInput = document.getElementById("imageInput");
      const outputImage = document.getElementById("outputImage");

      if(fileInput.files.length === 0){

        alert("Please select image");

        return;
      }

      const file = fileInput.files[0];

      const formData = new FormData();

      formData.append("image_file", file);
      formData.append("size", "auto");

      try{

        const response = await fetch(
          "https://api.remove.bg/v1.0/removebg",
          {
            method:"POST",

            headers:{
              "X-Api-Key":"vtA2JcUFLd8TMaoA7TXNvcUX"
            },

            body:formData
          }
        );

        const blob = await response.blob();

        const imageURL = URL.createObjectURL(blob);

        outputImage.src = imageURL;

      }

      catch(error){

        alert("Error removing background");

        console.log(error);

      }

    }

    // DOWNLOAD WITH BACKGROUND COLOR
    function downloadImage(){

      const outputImage = document.getElementById("outputImage");

      if(outputImage.src === ""){

        alert("Pehle image generate karo");

        return;
      }

      const canvas = document.getElementById("canvas");
      const ctx = canvas.getContext("2d");

      const img = new Image();

      img.crossOrigin = "anonymous";

      img.onload = function(){

        canvas.width = img.width;
        canvas.height = img.height;

        // Background color fill
        ctx.fillStyle = bgColorPicker.value;
        ctx.fillRect(0,0,canvas.width,canvas.height);

        // Image draw
        ctx.drawImage(img,0,0);

        // Download
        const link = document.createElement("a");

        link.download = "edited-image.png";

        link.href = canvas.toDataURL("image/png");

        link.click();
      };

      img.src = outputImage.src;
    }

  </script>

</body>
</html>
